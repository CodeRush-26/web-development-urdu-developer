<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fleet Command</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"
    />
    <style>
      :root {
        --bg-deep: #0c1514;
        --bg-mid: #11201d;
        --accent: #2ccf9d;
        --accent-soft: rgba(44, 207, 157, 0.2);
        --text-main: #e7f6f1;
        --text-dim: #9dc9bd;
        --danger: #ff6b6b;
        --warning: #ffd166;
        --panel: rgba(10, 18, 17, 0.86);
        --border: rgba(255, 255, 255, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text-main);
        background: radial-gradient(circle at top, #173029 0%, var(--bg-deep) 65%);
        overflow: hidden;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(260px, 320px) 1fr;
        height: 100vh;
      }

      .panel {
        background: var(--panel);
        border-right: 1px solid var(--border);
        padding: 28px 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        backdrop-filter: blur(12px);
        overflow-y: auto;
        scrollbar-gutter: stable;
      }

      .panel h1 {
        font-size: 22px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin: 0;
      }

      .panel .subtitle {
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 6px;
      }

      .status-card {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        background: rgba(16, 28, 26, 0.7);
      }

      .status-grid {
        display: grid;
        gap: 12px;
      }

      .status-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        color: var(--text-dim);
      }

      .status-item span {
        color: var(--text-main);
        font-weight: 600;
      }

      .legend {
        display: grid;
        gap: 10px;
      }

      .alerts {
        display: grid;
        gap: 12px;
      }

      .rerouting-list {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        display: grid;
        gap: 8px;
        background: rgba(14, 24, 22, 0.8);
      }

      .rerouting-list h3 {
        margin: 0;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-dim);
      }

      .rerouting-list .item {
        font-size: 12px;
        color: var(--text-main);
        display: flex;
        justify-content: space-between;
      }

      .alert-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
        background: rgba(14, 24, 22, 0.8);
      }

      .alert-card header {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        text-transform: uppercase;
        color: var(--text-dim);
        letter-spacing: 0.08em;
      }

      .alert-card .alert-title {
        margin: 6px 0 4px;
        font-size: 13px;
        font-weight: 600;
      }

      .alert-card .alert-meta {
        font-size: 11px;
        color: var(--text-dim);
      }

      .alert-card.warning {
        border-color: rgba(255, 209, 102, 0.4);
      }

      .alert-card.critical {
        border-color: rgba(255, 107, 107, 0.5);
      }

      .distress-form {
        display: grid;
        gap: 8px;
      }

      .distress-form select,
      .distress-form textarea {
        width: 100%;
        background: rgba(6, 12, 11, 0.6);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-main);
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        padding: 8px;
      }

      .distress-form button {
        background: var(--danger);
        color: #160707;
        border: none;
        border-radius: 10px;
        padding: 8px;
        font-weight: 600;
        cursor: pointer;
      }

      .distress-form button.secondary {
        background: transparent;
        color: var(--text-main);
        border: 1px solid var(--border);
      }

      .role-toggle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px;
        background: rgba(8, 14, 13, 0.6);
      }

      .role-toggle button {
        flex: 1;
        border: none;
        background: transparent;
        color: var(--text-dim);
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .role-toggle button.active {
        background: var(--accent);
        color: #071312;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        color: var(--text-dim);
      }

      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent-soft);
      }

      .legend-dot.warning {
        background: var(--warning);
        box-shadow: 0 0 10px rgba(255, 209, 102, 0.3);
      }

      .legend-dot.danger {
        background: var(--danger);
        box-shadow: 0 0 10px rgba(255, 107, 107, 0.35);
      }

      .map-shell {
        position: relative;
        overflow: hidden;
      }

      #map {
        height: 100vh;
        width: 100%;
      }

      .map-header {
        position: absolute;
        top: 24px;
        left: 24px;
        z-index: 500;
        background: rgba(10, 20, 19, 0.82);
        border: 1px solid var(--border);
        padding: 14px 18px;
        border-radius: 14px;
        backdrop-filter: blur(10px);
      }

      .map-header .title {
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .map-header .meta {
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        color: var(--text-dim);
      }

      body.role-captain .leaflet-draw {
        display: none;
      }

      .leaflet-div-icon.leaflet-editing-icon,
      .leaflet-marker-icon.leaflet-editing-icon {
        width: 12px;
        height: 12px;
        margin-left: -6px;
        margin-top: -6px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid #0b1b18;
        box-shadow: 0 0 10px var(--accent-soft);
      }

      .leaflet-popup-content-wrapper {
        background: #0c1716;
        color: var(--text-main);
        border-radius: 12px;
      }

      .leaflet-popup-tip {
        background: #0c1716;
      }

      .popup-title {
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .popup-grid {
        display: grid;
        gap: 6px;
        font-size: 12px;
        color: var(--text-dim);
      }

      .popup-grid span {
        color: var(--text-main);
        font-weight: 500;
      }

      @media (max-width: 960px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .panel {
          position: absolute;
          top: 16px;
          right: 16px;
          width: 260px;
          z-index: 600;
          border-radius: 18px;
          border: 1px solid var(--border);
        }

        .map-header {
          left: 16px;
          right: 16px;
          width: fit-content;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <div>
          <h1>Fleet Command</h1>
          <div class="subtitle">Strait of Hormuz live corridor</div>
        </div>
        <div class="status-card">
          <div class="status-grid">
            <div class="status-item">
              Connected <span id="ws-status">Connecting</span>
            </div>
            <div class="status-item">
              Ships Online <span id="ship-count">0</span>
            </div>
            <div class="status-item">
              Last Update <span id="last-update">--</span>
            </div>
          </div>
        </div>
        <div class="role-toggle" role="tablist">
          <button id="role-command" class="active" type="button">Command</button>
          <button id="role-captain" type="button">Captain</button>
        </div>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot"></div>
            Normal
          </div>
          <div class="legend-item">
            <div class="legend-dot warning"></div>
            Rerouting
          </div>
          <div class="legend-item">
            <div class="legend-dot danger"></div>
            Distressed / Stopped
          </div>
        </div>
        <div class="rerouting-list" id="rerouting-panel">
          <h3>Rerouting</h3>
          <div class="item">None</div>
        </div>
        <div class="alerts" id="alerts-panel"></div>
        <div class="distress-form">
          <select id="distress-ship"></select>
          <textarea id="distress-message" rows="3" placeholder="Captain distress message"></textarea>
          <button id="distress-send" type="button">Send Distress</button>
          <button id="distress-resolve" class="secondary" type="button">Resolve Distress</button>
        </div>
      </aside>
      <main class="map-shell">
        <div class="map-header">
          <div class="title">Operational Map</div>
          <div class="meta" id="map-meta">Initializing...</div>
        </div>
        <div id="map"></div>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script>
      const shipMarkers = new Map();
      const targetPositions = new Map();
      const portLookup = new Map();
      const zonesLayer = new L.FeatureGroup();
      const updateState = {
        lastUpdate: null,
      };
      const roleState = {
        role: localStorage.getItem("fleet-role") || "command",
      };
      const alertState = {
        items: [],
      };

      const map = L.map("map", {
        zoomControl: false,
        preferCanvas: true,
      }).setView([26.5, 54.5], 6);

      L.control.zoom({ position: "bottomright" }).addTo(map);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 8,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);

      map.addLayer(zonesLayer);

      const waterLayer = L.polygon([], {
        color: "#2ccf9d",
        weight: 1,
        fillColor: "#12342b",
        fillOpacity: 0.18,
      }).addTo(map);

      const statusEl = document.getElementById("ws-status");
      const shipCountEl = document.getElementById("ship-count");
      const lastUpdateEl = document.getElementById("last-update");
      const mapMetaEl = document.getElementById("map-meta");
      const commandBtn = document.getElementById("role-command");
      const captainBtn = document.getElementById("role-captain");
      const alertsPanel = document.getElementById("alerts-panel");
      const reroutingPanel = document.getElementById("rerouting-panel");
      const distressShip = document.getElementById("distress-ship");
      const distressMessage = document.getElementById("distress-message");
      const distressSend = document.getElementById("distress-send");
      const distressResolve = document.getElementById("distress-resolve");

      function applyRole(role) {
        roleState.role = role;
        localStorage.setItem("fleet-role", role);
        commandBtn.classList.toggle("active", role === "command");
        captainBtn.classList.toggle("active", role === "captain");
        document.body.classList.toggle("role-captain", role === "captain");
        drawControl.setDrawingOptions({
          polygon: role === "command",
          rectangle: false,
          circle: false,
          circlemarker: false,
          marker: false,
          polyline: false,
        });
      }

      function statusColor(status) {
        const value = (status || "").toLowerCase().trim();
        if (value.includes("rerout")) {
          return "#ffd166";
        }
        if (value.includes("distress") || value.includes("stopped") || value.includes("dead")) {
          return "#ff6b6b";
        }
        return "#2ccf9d";
      }

      function markerStyle(status) {
        const color = statusColor(status);
        const value = (status || "").toLowerCase().trim();
        let radius = 6;
        let weight = 2;
        if (value.includes("rerout")) {
          radius = 8;
          weight = 3;
        }
        if (value.includes("distress") || value.includes("stopped") || value.includes("dead")) {
          radius = 9;
          weight = 3;
        }
        return {
          radius,
          color,
          weight,
          fillColor: color,
          fillOpacity: 0.9,
        };
      }

      function formatPopup(ship) {
        const destination = portLookup.get(ship.destination_id) || ship.destination_id;
        return `
          <div class="popup-title">${ship.name} (${ship.ship_id})</div>
          <div class="popup-grid">
            <div>Fuel: <span>${ship.fuel.toFixed(1)} tons</span></div>
            <div>Speed: <span>${ship.speed.toFixed(1)} kn</span></div>
            <div>Heading: <span>${ship.heading}°</span></div>
            <div>Destination: <span>${destination}</span></div>
            <div>Cargo: <span>${ship.cargo}</span></div>
            <div>Status: <span>${ship.status}</span></div>
          </div>
        `;
      }

      function ensureMarker(ship) {
        if (shipMarkers.has(ship.ship_id)) {
          return shipMarkers.get(ship.ship_id);
        }

        const marker = L.circleMarker(
          [ship.latitude, ship.longitude],
          markerStyle(ship.status)
        ).addTo(map);

        marker.bindPopup(formatPopup(ship), { closeButton: false });
        marker.on("click", () => marker.openPopup());
        shipMarkers.set(ship.ship_id, marker);
        return marker;
      }

      function setTarget(ship) {
        const marker = ensureMarker(ship);
        const style = markerStyle(ship.status);
        marker.setStyle(style);
        marker.setRadius(style.radius);
        marker.options.color = style.color;
        marker.options.fillColor = style.fillColor;
        marker.redraw();
        marker.setPopupContent(formatPopup(ship));

        targetPositions.set(ship.ship_id, {
          lat: ship.latitude,
          lng: ship.longitude,
          timestamp: performance.now(),
          from: marker.getLatLng(),
        });
      }

      function animateMarkers(time) {
        targetPositions.forEach((target, shipId) => {
          const marker = shipMarkers.get(shipId);
          if (!marker) {
            return;
          }
          const elapsed = Math.min((time - target.timestamp) / 950, 1);
          const lat = target.from.lat + (target.lat - target.from.lat) * elapsed;
          const lng = target.from.lng + (target.lng - target.from.lng) * elapsed;
          marker.setLatLng([lat, lng]);
          if (elapsed >= 1) {
            targetPositions.delete(shipId);
          }
        });

        requestAnimationFrame(animateMarkers);
      }

      async function fetchPorts() {
        const response = await fetch("/api/ports/");
        const data = await response.json();
        data.ports.forEach((port) => {
          portLookup.set(port.code, port.name);
        });
      }

      async function fetchZones() {
        const response = await fetch("/api/zones/");
        const data = await response.json();
        zonesLayer.clearLayers();
        data.zones.forEach((zone) => {
          const polygon = L.polygon(zone.polygon, {
            color: "#ff6b6b",
            weight: 2,
            fillColor: "#ff6b6b",
            fillOpacity: 0.2,
          });
          polygon.zoneId = zone.id;
          polygon.addTo(zonesLayer);
        });
      }

      async function fetchWater() {
        const response = await fetch("/api/navigable-water/");
        const data = await response.json();
        if (Array.isArray(data.polygon) && data.polygon.length) {
          waterLayer.setLatLngs(data.polygon);
          map.fitBounds(waterLayer.getBounds(), { padding: [40, 40] });
        }
      }

      async function saveZone(latLngs, zoneId) {
        const payload = {
          name: "Restricted Zone",
          polygon: latLngs.map((point) => [point.lat, point.lng]),
        };
        const url = zoneId ? `/api/zones/${zoneId}/` : "/api/zones/";
        const method = zoneId ? "PUT" : "POST";
        await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        await fetchZones();
      }

      async function deleteZone(zoneId) {
        await fetch(`/api/zones/${zoneId}/`, { method: "DELETE" });
        await fetchZones();
      }

      function updateMeta() {
        if (!updateState.lastUpdate) {
          lastUpdateEl.textContent = "--";
          return;
        }
        const seconds = Math.max(0, Math.floor((Date.now() - updateState.lastUpdate) / 1000));
        lastUpdateEl.textContent = `${seconds}s ago`;
      }

      function handleShips(ships) {
        ships.forEach(setTarget);
        shipCountEl.textContent = ships.length;
        updateState.lastUpdate = Date.now();
        mapMetaEl.textContent = `Tracking ${ships.length} active hulls`;
        updateDistressShips(ships);
        renderRerouting(ships);
      }

      function renderRerouting(ships) {
        const rerouting = ships.filter((ship) =>
          (ship.status || "").toLowerCase().includes("rerout")
        );
        reroutingPanel.innerHTML = "<h3>Rerouting</h3>";
        if (!rerouting.length) {
          reroutingPanel.innerHTML += "<div class=\"item\">None</div>";
          return;
        }
        rerouting.forEach((ship) => {
          reroutingPanel.innerHTML += `
            <div class="item" data-ship-id="${ship.ship_id}">
              <span>${ship.name}</span>
              <span>${ship.ship_id}</span>
            </div>
          `;
        });
      }

      function updateDistressShips(ships) {
        if (distressShip.options.length === ships.length) {
          return;
        }
        distressShip.innerHTML = "";
        ships.forEach((ship) => {
          const option = document.createElement("option");
          option.value = ship.ship_id;
          option.textContent = `${ship.name} (${ship.ship_id})`;
          distressShip.appendChild(option);
        });
      }

      function renderAlerts() {
        alertsPanel.innerHTML = "";
        alertState.items.slice(0, 6).forEach((alert) => {
          const card = document.createElement("div");
          card.className = `alert-card ${alert.severity}`;
          card.innerHTML = `
            <header>
              <span>${alert.alert_type}</span>
              <span>${new Date(alert.created_at).toLocaleTimeString()}</span>
            </header>
            <div class="alert-title">${alert.message}</div>
            <div class="alert-meta">Ship: ${alert.ship_id || "--"}</div>
          `;
          alertsPanel.appendChild(card);
        });
      }

      function playAlertTone(severity) {
        if (severity !== "critical") {
          return;
        }
        try {
          const context = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = context.createOscillator();
          const gain = context.createGain();
          oscillator.type = "sine";
          oscillator.frequency.value = 880;
          gain.gain.value = 0.04;
          oscillator.connect(gain);
          gain.connect(context.destination);
          oscillator.start();
          setTimeout(() => {
            oscillator.stop();
            context.close();
          }, 250);
        } catch (error) {
          // Ignore audio failures.
        }
      }

      const drawControl = new L.Control.Draw({
        draw: {
          polygon: true,
          rectangle: false,
          circle: false,
          circlemarker: false,
          marker: false,
          polyline: false,
        },
        edit: {
          featureGroup: zonesLayer,
          edit: true,
          remove: true,
        },
      });

      map.addControl(drawControl);

      map.on(L.Draw.Event.CREATED, async (event) => {
        if (roleState.role !== "command") {
          return;
        }
        const layer = event.layer;
        const latLngs = layer.getLatLngs()[0];
        await saveZone(latLngs, null);
      });

      map.on(L.Draw.Event.EDITED, async (event) => {
        if (roleState.role !== "command") {
          return;
        }
        event.layers.eachLayer(async (layer) => {
          const latLngs = layer.getLatLngs()[0];
          await saveZone(latLngs, layer.zoneId);
        });
      });

      map.on(L.Draw.Event.DELETED, async (event) => {
        if (roleState.role !== "command") {
          return;
        }
        event.layers.eachLayer(async (layer) => {
          if (layer.zoneId) {
            await deleteZone(layer.zoneId);
          }
        });
      });

      function connectSocket() {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${protocol}://${window.location.host}/ws/fleet/`);

        socket.addEventListener("open", () => {
          statusEl.textContent = "Live";
        });

        socket.addEventListener("message", (event) => {
          const payload = JSON.parse(event.data);
          window.lastShipPayload = payload;
          if (payload.type === "ship_update") {
            window.lastShipUpdate = payload;
            handleShips(payload.ships);
          }
          if (payload.type === "alert_update") {
            alertState.items = payload.alerts || [];
            renderAlerts();
            if (payload.alerts && payload.alerts[0]) {
              playAlertTone(payload.alerts[0].severity);
            }
          }
        });

        socket.addEventListener("close", () => {
          statusEl.textContent = "Reconnecting";
          setTimeout(connectSocket, 1200);
        });

        socket.addEventListener("error", () => {
          statusEl.textContent = "Error";
        });
      }

      async function init() {
        statusEl.textContent = "Connecting";
        await Promise.all([fetchPorts(), fetchWater(), fetchZones()]);
        commandBtn.addEventListener("click", () => applyRole("command"));
        captainBtn.addEventListener("click", () => applyRole("captain"));
        applyRole(roleState.role);
        reroutingPanel.addEventListener("click", (event) => {
          const target = event.target.closest("[data-ship-id]");
          if (!target) {
            return;
          }
          const shipId = target.getAttribute("data-ship-id");
          const marker = shipMarkers.get(shipId);
          if (marker) {
            map.setView(marker.getLatLng(), Math.max(map.getZoom(), 7), {
              animate: true,
            });
            marker.openPopup();
          }
        });
        distressSend.addEventListener("click", async () => {
          const shipId = distressShip.value;
          const message = distressMessage.value.trim();
          if (!shipId || !message) {
            return;
          }
          await fetch("/api/distress/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ship_id: shipId, message }),
          });
          distressMessage.value = "";
        });
        distressResolve.addEventListener("click", async () => {
          const shipId = distressShip.value;
          if (!shipId) {
            return;
          }
          await fetch("/api/distress/resolve/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ship_id: shipId }),
          });
        });
        connectSocket();
        requestAnimationFrame(animateMarkers);
        setInterval(updateMeta, 1000);
      }

      init();
    </script>
  </body>
</html>
